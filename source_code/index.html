    <!-- Curated Design-panel fonts (system-sans/system-serif need no network fetch).
         font-display=swap keeps text visible in a fallback stack while these load,

         if the request fails offline (AC3). -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Merriweather:wght@400;700&family=Roboto+Slab:wght@400;700&family=Lato:wght@400;700&display=swap"

    />
